name: Aspire Publish Pipeline

on:
  push:
    branches: ['production']

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Install Aspire CLI
        run: dotnet tool install --global aspire.cli

      - name: Aspire Publish
        run: aspire publish -o artifacts
        working-directory: backend/Ems.Aspire/Ems.AppHost

      - name: Debug - List images
        run: docker images

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Tag & Push images
        run: |
          BUILD_NUMBER=${{ github.run_number }}
          BRANCH_NAME=${{ github.ref_name }}
          SANITIZED_BRANCH_NAME=$(echo "$BRANCH_NAME" | sed 's#[^a-zA-Z0-9._-]#-#g')

          for image in exammanagementdbmigrator exammanagementhostapi examexecutiondbmigrator examexecutionhostapi; do
            docker tag $image:latest ghcr.io/${{ github.repository_owner }}/$image:${SANITIZED_BRANCH_NAME}-${BUILD_NUMBER}
            docker push ghcr.io/${{ github.repository_owner }}/$image:${SANITIZED_BRANCH_NAME}-${BUILD_NUMBER}
          done
